services:
  - type: web
    name: leetgame-backend
    env: go
    rootDir: backend
    buildCommand: go build -o server ./cmd/server
    startCommand: ./server
    envVars:
      - key: STORAGE_DB_URL
        sync: false
      - key: LLM_PROVIDER
        value: ollama
      - key: LLM_MODEL
        value: gemma4:31b-cloud
      - key: LLM_OLLAMA_URL
        value: https://ollama.com
      - key: LLM_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: AUTH_SUPABASE_JWT_SECRET
        sync: false
      - key: SERVER_ALLOWED_ORIGINS
        sync: false

  - type: static
    name: leetgame-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
